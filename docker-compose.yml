x-party-common: &party-common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      BASE_IMAGE: noise-base:latest
  working_dir: /app
  volumes:
    - ./artifacts:/artifacts
    - ./noise.docker.conf:/app/noise.docker.conf:ro
  devices:
    - /dev/sgx_enclave:/dev/sgx_enclave
    - /dev/sgx_provision:/dev/sgx_provision
  restart: unless-stopped

services:
  base:
    image: noise-base:latest
    build:
      context: .
      dockerfile: Dockerfile.base
    profiles:
      - base

  party1:
    <<: *party-common
    container_name: noise-party-1
    networks:
      - noise-net
    ports:
      - "7005:7000"
    entrypoint: ["/app/build/host/apps/noise_party"]
    command: ["/app/build/enclave/noise_enclave.signed", "/app/noise.docker.conf", "party1"]

  party2:
    <<: *party-common
    container_name: noise-party-2
    networks:
      - noise-net
    ports:
      - "7006:7000"
    entrypoint: ["/app/build/host/apps/noise_party"]
    command: ["/app/build/enclave/noise_enclave.signed", "/app/noise.docker.conf", "party2"]

  party3:
    <<: *party-common
    container_name: noise-party-3
    networks:
      - noise-net
    ports:
      - "7007:7000"
    entrypoint: ["/app/build/host/apps/noise_party"]
    command: ["/app/build/enclave/noise_enclave.signed", "/app/noise.docker.conf", "party3"]

  party4:
    <<: *party-common
    container_name: noise-party-4
    networks:
      - noise-net
    ports:
      - "7008:7000"
    entrypoint: ["/app/build/host/apps/noise_party"]
    command: ["/app/build/enclave/noise_enclave.signed", "/app/noise.docker.conf", "party4"]

  controller:
    <<: *party-common
    container_name: noise-controller
    profiles:
      - tools
    networks:
      - noise-net
    entrypoint: ["/app/build/host/apps/noise_ctl"]
    command: ["1", "26469202", "100000", "/app/noise.docker.conf"]

networks:
  noise-net:
    driver: bridge
