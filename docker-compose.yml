x-party-common: &party-common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      BASE_IMAGE: dkg-base:latest
  working_dir: /app
  volumes:
    - ./artifacts:/artifacts
    - ./dkg.docker.conf:/app/dkg.docker.conf:ro
  devices:
    - /dev/sgx_enclave:/dev/sgx_enclave
    - /dev/sgx_provision:/dev/sgx_provision
  restart: unless-stopped

services:
  base:
    image: dkg-base:latest
    build:
      context: .
      dockerfile: Dockerfile.base
    profiles:
      - base

  party1:
    <<: *party-common
    container_name: party-node-1
    networks:
      - dkg-net
    ports:
      - "7005:7000"
    entrypoint: ["/app/build/host/apps/party_node"]
    command: ["/app/build/enclave/dkg_enclave.signed", "/app/dkg.docker.conf", "party1"]

  party2:
    <<: *party-common
    container_name: party-node-2
    networks:
      - dkg-net
    ports:
      - "7006:7000"
    entrypoint: ["/app/build/host/apps/party_node"]
    command: ["/app/build/enclave/dkg_enclave.signed", "/app/dkg.docker.conf", "party2"]

  party3:
    <<: *party-common
    container_name: party-node-3
    networks:
      - dkg-net
    ports:
      - "7007:7000"
    entrypoint: ["/app/build/host/apps/party_node"]
    command: ["/app/build/enclave/dkg_enclave.signed", "/app/dkg.docker.conf", "party3"]

  party4:
    <<: *party-common
    container_name: party-node-4
    networks:
      - dkg-net
    ports:
      - "7008:7000"
    entrypoint: ["/app/build/host/apps/party_node"]
    command: ["/app/build/enclave/dkg_enclave.signed", "/app/dkg.docker.conf", "party4"]

  controller:
    <<: *party-common
    container_name: dkg-controller
    profiles:
      - tools
    networks:
      - dkg-net
    entrypoint: ["/app/build/host/apps/round_controller"]
    command: ["1", "26469202", "100000", "/app/dkg.docker.conf"]

networks:
  dkg-net:
    driver: bridge

